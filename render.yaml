# Render Blueprint for the PWRL Strapi backend.
#
# Usage:
#   1. In Render, click "New +" -> "Blueprint" and pick this repo.
#   2. Render reads this file and pre-creates the Strapi web service.
#   3. You will be prompted to fill in the values marked `sync: false` below
#      (DATABASE_URL from Neon, Cloudinary creds). The `generateValue: true`
#      secrets are auto-generated by Render and never echoed.
#   4. Click Apply. First build takes 5-8 min.
#
# Frontend (Vercel) is intentionally NOT in this blueprint - Vercel has its
# own project-import flow; see DEPLOY.md.
services:
  - type: web
    name: pwrl-cms-humandesign
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    # Drop stale config/sync/*.json left on Render disk — they are not in git but can
    # crash boot when importOnBootstrap was previously enabled.
    buildCommand: rm -f config/sync/*.json 2>/dev/null; npm install && npm run build
    startCommand: npm run start
    # No healthCheckPath: Strapi v5 has no built-in JSON health endpoint, so we
    # rely on Render's default TCP probe on $PORT. If you add a custom
    # /api/health route later, set healthCheckPath: /api/health here.
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337

      # Secrets that Render will auto-generate. Never displayed; never logged.
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

      # Database - paste the Neon connection string when prompted.
      # See backend/config/database.ts for how SSL is wired up.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Cloudinary - paste credentials when prompted.
      # See backend/config/plugins.ts for env-gated provider switching.
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false

      # Preview button plugin — opens the Vercel staging site from Content Manager.
      - key: STRAPI_PREVIEW_SITE_URL
        value: https://pwrl-staging-website-y.vercel.app
      - key: FRONTEND_URL
        value: https://pwrl-staging-website-y.vercel.app

      # Draft preview — same secret as Vercel STRAPI_PREVIEW_SECRET
      - key: STRAPI_PREVIEW_SECRET
        sync: false
